name: Feature Request
description: Suggest a new feature or improvement for Unity Cursor Toolkit
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! Please describe the feature you have in mind.
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does this solve? What's the pain point?
      placeholder: "Is your feature request related to a problem? Please describe..."
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: "Describe the solution you'd like..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered (optional)
      description: Any alternative solutions or features you've thought about
      placeholder: "Describe any alternatives you've considered..."
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context (optional)
      description: Add any other context, screenshots, or examples
      placeholder: "Add any other context about the request here..."
    validations:
      required: false
