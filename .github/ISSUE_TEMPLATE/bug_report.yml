name: Bug Report
description: Report a bug or unexpected behavior in Unity Cursor Toolkit
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Unity Cursor Toolkit! Please fill out the form below.
  - type: input
    id: unity-version
    attributes:
      label: Unity Version
      description: Which version of Unity are you using?
      placeholder: "e.g. 2022.3 LTS"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      description: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Unity Cursor Toolkit extension version
      placeholder: "e.g. 1.5.0"
    validations:
      required: true
  - type: dropdown
    id: editor
    attributes:
      label: Editor
      description: Which editor are you using?
      options:
        - VS Code
        - Cursor
        - Other
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear, concise description of the bug
      placeholder: "Describe what went wrong..."
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Open...
        2. Click on...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: "Describe the expected behavior..."
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: "Describe what you observed..."
    validations:
      required: true
  - type: textarea
    id: console-logs
    attributes:
      label: Console / Error Logs (optional)
      description: Relevant logs from the Output panel or Developer Tools
      placeholder: "Paste any relevant log output..."
      render: shell
    validations:
      required: false
  - type: upload
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Add screenshots if they help explain the problem
    validations:
      required: false
