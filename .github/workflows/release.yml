name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      upm_version: ${{ steps.upm.outputs.upm_version }}
    defaults:
      run:
        working-directory: unity-cursor-toolkit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: unity-cursor-toolkit/package-lock.json

      - name: Use npm 11.14.1
        run: |
          npm install -g npm@11.14.1
          npm --version

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Read UPM version
        id: upm
        run: |
          UPM_PKG="../Packages/com.rankupgames.unity-cursor-toolkit/package.json"
          UPM_VERSION=$(node -e "console.log(require('${UPM_PKG}').version)")
          echo "upm_version=${UPM_VERSION}" >> $GITHUB_OUTPUT
          echo "UPM package version: ${UPM_VERSION}"

      - name: Stamp extension version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - run: npm ci

      - name: Validate extension
        run: npm run validate

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-release-${{ steps.version.outputs.version }}
          path: unity-cursor-toolkit/*.vsix

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release-approval
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    defaults:
      run:
        working-directory: unity-cursor-toolkit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: unity-cursor-toolkit/package-lock.json

      - name: Use npm 11.14.1
        run: |
          npm install -g npm@11.14.1
          npm --version

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: vsix-release-${{ needs.build.outputs.version }}
          path: unity-cursor-toolkit

      - name: Locate VSIX
        id: vsix
        run: |
          VSIX_FILE=$(ls *.vsix | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::No VSIX artifact downloaded"
            exit 1
          fi
          echo "file=${VSIX_FILE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          UPM_VERSION="${{ needs.build.outputs.upm_version }}"
          VSIX_FILE="${{ steps.vsix.outputs.file }}"
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          REPO="${{ github.repository }}"

          cat > /tmp/release-notes.md <<EOFNOTES
          ## Unity Cursor Toolkit v${VERSION}

          | Field | Value |
          |-------|-------|
          | Extension | \`${VERSION}\` |
          | UPM Package | \`${UPM_VERSION}\` |
          | Commit | \`${COMMIT_SHORT}\` |

          ### Cursor/VS Code Extension
          Download the \`.vsix\` below or install from the marketplace.

          ### Unity Package (UPM)
          \`\`\`
          openupm add com.rankupgames.unity-cursor-toolkit
          \`\`\`
          Or add via git URL in Unity Package Manager:
          \`\`\`
          https://github.com/${REPO}.git?path=Packages/com.rankupgames.unity-cursor-toolkit#v${VERSION}
          \`\`\`
          EOFNOTES

          gh release create "v${VERSION}" \
            --repo "${REPO}" \
            --title "Unity Cursor Toolkit v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "${VSIX_FILE}"

      - name: Publish to Marketplace
        if: env.VSCE_PAT != ''
        run: npx vsce publish --packagePath "${{ steps.vsix.outputs.file }}"

      - name: Publish to OpenVSX
        if: env.OVSX_PAT != ''
        run: npx ovsx publish "${{ steps.vsix.outputs.file }}" -p "$OVSX_PAT"
