name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      upm_version: ${{ steps.upm.outputs.upm_version }}
    defaults:
      run:
        working-directory: unity-cursor-toolkit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: unity-cursor-toolkit/package-lock.json

      - name: Use npm 11.14.1
        run: |
          npm install -g npm@11.14.1
          npm --version

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Read UPM version
        id: upm
        run: |
          UPM_PKG="../Packages/com.rankupgames.unity-cursor-toolkit/package.json"
          UPM_VERSION=$(node -e "console.log(require('${UPM_PKG}').version)")
          echo "upm_version=${UPM_VERSION}" >> $GITHUB_OUTPUT
          echo "UPM package version: ${UPM_VERSION}"

      - name: Stamp extension version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - run: npm ci

      - name: Validate extension
        run: npm run validate

      - name: Package VS Code Marketplace VSIX
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/vscode
          npx vsce package --no-dependencies --out "dist/vscode/unity-cursor-toolkit-vscode-${VERSION}.vsix"

      - name: Package OpenVSX VSIX
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/openvsx
          npx vsce package --no-dependencies --out "dist/openvsx/unity-cursor-toolkit-openvsx-${VERSION}.vsix"

      - uses: actions/upload-artifact@v7
        with:
          name: vscode-release-${{ steps.version.outputs.version }}
          path: unity-cursor-toolkit/dist/vscode/*.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: openvsx-release-${{ steps.version.outputs.version }}
          path: unity-cursor-toolkit/dist/openvsx/*.vsix

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release-approval
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    defaults:
      run:
        working-directory: unity-cursor-toolkit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: unity-cursor-toolkit/package-lock.json

      - name: Use npm 11.14.1
        run: |
          npm install -g npm@11.14.1
          npm --version

      - name: Validate publish tokens
        run: |
          missing=0
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT is required to publish the VS Code Marketplace package"
            missing=1
          fi
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT is required to publish the OpenVSX package"
            missing=1
          fi
          exit "$missing"

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: vscode-release-${{ needs.build.outputs.version }}
          path: unity-cursor-toolkit/dist/vscode

      - uses: actions/download-artifact@v8
        with:
          name: openvsx-release-${{ needs.build.outputs.version }}
          path: unity-cursor-toolkit/dist/openvsx

      - name: Locate VSIX artifacts
        id: vsix
        run: |
          VSCODE_VSIX=$(ls dist/vscode/*.vsix | head -1)
          OPENVSX_VSIX=$(ls dist/openvsx/*.vsix | head -1)
          if [ -z "$VSCODE_VSIX" ]; then
            echo "::error::No VS Code Marketplace VSIX artifact downloaded"
            exit 1
          fi
          if [ -z "$OPENVSX_VSIX" ]; then
            echo "::error::No OpenVSX VSIX artifact downloaded"
            exit 1
          fi
          echo "vscode=${VSCODE_VSIX}" >> $GITHUB_OUTPUT
          echo "openvsx=${OPENVSX_VSIX}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          UPM_VERSION="${{ needs.build.outputs.upm_version }}"
          VSCODE_VSIX="${{ steps.vsix.outputs.vscode }}"
          OPENVSX_VSIX="${{ steps.vsix.outputs.openvsx }}"
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          REPO="${{ github.repository }}"

          cat > /tmp/release-notes.md <<EOFNOTES
          ## Unity Cursor Toolkit v${VERSION}

          | Field | Value |
          |-------|-------|
          | Extension | \`${VERSION}\` |
          | UPM Package | \`${UPM_VERSION}\` |
          | Commit | \`${COMMIT_SHORT}\` |

          ### Cursor/VS Code Extension
          Download the \`.vsix\` below or install from the marketplace.

          ### Unity Package (UPM)
          \`\`\`
          openupm add com.rankupgames.unity-cursor-toolkit
          \`\`\`
          Or add via git URL in Unity Package Manager:
          \`\`\`
          https://github.com/${REPO}.git?path=Packages/com.rankupgames.unity-cursor-toolkit#v${VERSION}
          \`\`\`
          EOFNOTES

          gh release create "v${VERSION}" \
            --repo "${REPO}" \
            --title "Unity Cursor Toolkit v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "${VSCODE_VSIX}" \
            "${OPENVSX_VSIX}"

      - name: Publish to VS Code Marketplace
        id: publish_vscode
        continue-on-error: true
        run: npx vsce publish --packagePath "${{ steps.vsix.outputs.vscode }}"

      - name: Publish to OpenVSX
        id: publish_openvsx
        continue-on-error: true
        run: npx ovsx publish "${{ steps.vsix.outputs.openvsx }}" -p "$OVSX_PAT"

      - name: Fail if any registry publish failed
        run: |
          if [ "${{ steps.publish_vscode.outcome }}" != "success" ] || [ "${{ steps.publish_openvsx.outcome }}" != "success" ]; then
            echo "::error::One or more registry publish steps failed"
            exit 1
          fi

      - name: Publish summary
        if: always()
        run: |
          echo "## Marketplace Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| VS Code Marketplace | ${{ steps.publish_vscode.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenVSX | ${{ steps.publish_openvsx.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
