name: Extension Build

on:
  push:
    branches: [main, 'Version-*']
  pull_request:
    branches: [main, 'Version-*']
  schedule:
    - cron: '0 11 * * 5'  # Friday 6am EST -- weekly build
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
      build_version: ${{ steps.version.outputs.build_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changes since last build
        id: changes
        run: |
          echo "has_changes=true" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Friday scheduled run, building VS Code and OpenVSX packages"
          else
            echo "Non-scheduled run, building extension packages"
          fi

      - name: Compute version
        id: version
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date -u +%m%d%y)
          TODAY_ISO=$(date -u +%Y-%m-%d)

          DAILY_RUNS=$(gh api "repos/${{ github.repository }}/actions/runs?created=>=${TODAY_ISO}&per_page=100" \
            --jq '[.workflow_runs[] | select(.name == "Extension Build")] | length' 2>/dev/null || echo "0")
          DAILY_INCREMENT=${DAILY_RUNS:-0}

          BUILD_VERSION="0.6.${DAILY_INCREMENT}${TODAY}"
          echo "build_version=${BUILD_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${BUILD_VERSION}"

  build:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unity-cursor-toolkit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: unity-cursor-toolkit/package-lock.json

      - name: Use npm 11.14.1
        run: |
          npm install -g npm@11.14.1
          npm --version

      - name: Stamp version
        run: |
          VERSION="${{ needs.check-changes.outputs.build_version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Stamped package.json -> ${VERSION}"

      - run: npm ci

      - name: Validate extension
        run: npm run validate

      - name: Validate UPM package
        run: |
          UPM_PKG="../Packages/com.rankupgames.unity-cursor-toolkit/package.json"
          if [ ! -f "$UPM_PKG" ]; then
            echo "::error::UPM package.json not found at $UPM_PKG"
            exit 1
          fi
          node -e "
            const pkg = require('$UPM_PKG');
            const missing = [];
            if (!pkg.name) missing.push('name');
            if (!pkg.version) missing.push('version');
            if (!pkg.unity) missing.push('unity');
            if (missing.length > 0) {
              console.error('UPM package.json missing required fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('UPM package valid:', pkg.name, pkg.version, '(unity >=', pkg.unity + ')');
          "

      - name: Package VS Code Marketplace VSIX
        run: |
          VERSION="${{ needs.check-changes.outputs.build_version }}"
          mkdir -p dist/vscode
          npx vsce package --no-dependencies --out "dist/vscode/unity-cursor-toolkit-vscode-${VERSION}.vsix"

      - name: Package OpenVSX VSIX
        run: |
          VERSION="${{ needs.check-changes.outputs.build_version }}"
          mkdir -p dist/openvsx
          npx vsce package --no-dependencies --out "dist/openvsx/unity-cursor-toolkit-openvsx-${VERSION}.vsix"

      - uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-${{ needs.check-changes.outputs.build_version }}
          path: unity-cursor-toolkit/dist/vscode/*.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: openvsx-extension-${{ needs.check-changes.outputs.build_version }}
          path: unity-cursor-toolkit/dist/openvsx/*.vsix

      - name: Build summary
        if: always()
        run: |
          echo "## Extension Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.check-changes.outputs.build_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VS Code Artifact | \`vscode-extension-${{ needs.check-changes.outputs.build_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenVSX Artifact | \`openvsx-extension-${{ needs.check-changes.outputs.build_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  publish:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    defaults:
      run:
        working-directory: unity-cursor-toolkit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: unity-cursor-toolkit/package-lock.json

      - name: Use npm 11.14.1
        run: |
          npm install -g npm@11.14.1
          npm --version

      - name: Validate publish tokens
        run: |
          missing=0
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT is required to publish the VS Code Marketplace package"
            missing=1
          fi
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT is required to publish the OpenVSX package"
            missing=1
          fi
          exit "$missing"

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: vscode-extension-${{ needs.check-changes.outputs.build_version }}
          path: unity-cursor-toolkit/dist/vscode

      - uses: actions/download-artifact@v8
        with:
          name: openvsx-extension-${{ needs.check-changes.outputs.build_version }}
          path: unity-cursor-toolkit/dist/openvsx

      - name: Publish to VS Code Marketplace
        run: |
          VSIX_FILE=$(ls dist/vscode/*.vsix | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::No VS Code Marketplace VSIX artifact downloaded"
            exit 1
          fi
          npx vsce publish --packagePath "$VSIX_FILE"

      - name: Publish to OpenVSX
        run: |
          VSIX_FILE=$(ls dist/openvsx/*.vsix | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::No OpenVSX VSIX artifact downloaded"
            exit 1
          fi
          npx ovsx publish "$VSIX_FILE" -p "$OVSX_PAT"

      - name: Publish summary
        if: always()
        run: |
          echo "## Marketplace Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.check-changes.outputs.build_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| VS Code Marketplace | attempted |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenVSX | attempted |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
